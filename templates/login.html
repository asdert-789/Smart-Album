{% extends 'base.html' %}

{% block content %}
<div class="hero-wrapper" style="background-image: url('{{ url_for('static', filename='images/Gemini_Generated_Image_8y59p68y59p68y59.png') }}');">
    
    <div class="hero-bg-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
    </div>

    <div class="hero-glass-card auth-card" style="max-width: 450px; padding: 40px 30px;">
        <h2><i class="fa-solid fa-key"></i> 會員登入</h2>
        <form action="{{ url_for('auth.login') }}" method="POST">
            <div class="form-group">
                <label for="email"><i class="fa-solid fa-envelope"></i> 電子郵件帳號 (Email):</label>
                <input type="email" id="email" name="email" placeholder="example@email.com" required>
            </div>
            <div class="form-group">
                <label for="password"><i class="fa-solid fa-lock"></i> 密碼:</label>
                <input type="password" id="password" name="password" placeholder="請輸入密碼" required>
            </div>
            <button type="submit" class="btn btn-primary"><i class="fa-solid fa-right-to-bracket"></i> 登入</button>
        </form>
        
        <hr style="margin: 20px 0; border: 0; border-top: 1px solid #f3d1b5;">
        
        <div class="auth-footer">
            <p>還沒有帳號嗎？</p>
            <a href="{{ url_for('auth.register') }}" class="btn btn-secondary"><i class="fa-solid fa-user-gear"></i> 跳轉至建立新帳號</a>
        </div>
    </div>
</div>
{% endblock %}
